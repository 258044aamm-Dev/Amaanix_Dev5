<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection — AMAANIX</title>
    <meta name="description" content="Browse our full collection of premium home, office, and lifestyle essentials. Filter, sort, and find your perfect product.">
    <meta property="og:title" content="Collection — AMAANIX">
    <meta property="og:description" content="Browse our full collection of premium essentials.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.amaanix.com/collection">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&family=Proza+Libre:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@0.473.0"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="collection.css">
</head>
<body>

    <a href="#collection-main" class="skip-link">Skip to main content</a>
    <div class="toast-container" id="toastContainer"></div>

    <div id="announcement-bar-placeholder"></div>
    <div id="header-placeholder"></div>
    <div id="mobile-menu-placeholder"></div>

    <main id="collection-main">

        <section class="collection-hero">
            <div class="container">
                <nav class="collection-breadcrumb" aria-label="Breadcrumb">
                    <a href="index.html">Home</a>
                    <i class="fas fa-chevron-right" aria-hidden="true"></i>
                    <span aria-current="page">All Products</span>
                </nav>
                <h1 class="collection-hero-title">Explore Products</h1>
                <p class="collection-hero-sub">Thoughtfully curated essentials for every dimension of modern living.</p>
            </div>
        </section>

        <section class="collection-section">
            <div class="container">
                <div class="collection-layout">

                    <aside class="collection-filters" id="collectionFilters" aria-label="Product filters">
                        <div class="filters-header">
                            <h2 class="filters-title">Filters</h2>
                            <button class="filters-clear" id="clearAllFilters" type="button">Clear All</button>
                            <button class="filters-close" id="filtersClose" type="button" aria-label="Close filters">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>

                        <div class="filter-group">
                            <h3 class="filter-group-title">Category</h3>
                            <div class="filter-options" id="categoryFilters">
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="all" checked data-filter="category">
                                    <span class="check-indicator"></span>
                                    All
                                </label>
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="Office" data-filter="category">
                                    <span class="check-indicator"></span>
                                    Office
                                </label>
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="Home" data-filter="category">
                                    <span class="check-indicator"></span>
                                    Home
                                </label>
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="Kitchen" data-filter="category">
                                    <span class="check-indicator"></span>
                                    Kitchen
                                </label>
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="Electronics" data-filter="category">
                                    <span class="check-indicator"></span>
                                    Electronics
                                </label>
                                <label class="filter-checkbox">
                                    <input type="checkbox" value="Lifestyle" data-filter="category">
                                    <span class="check-indicator"></span>
                                    Lifestyle
                                </label>
                            </div>
                        </div>

                        <div class="filter-group">
                            <h3 class="filter-group-title">Price Range</h3>
                            <div class="filter-options" id="priceFilters">
                                <label class="filter-checkbox">
                                    <input type="radio" name="price" value="all" checked data-filter="price">
                                    <span class="check-indicator radio"></span>
                                    All Prices
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="price" value="0-25" data-filter="price">
                                    <span class="check-indicator radio"></span>
                                    Under $25
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="price" value="25-50" data-filter="price">
                                    <span class="check-indicator radio"></span>
                                    $25 — $50
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="price" value="50-100" data-filter="price">
                                    <span class="check-indicator radio"></span>
                                    $50 — $100
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="price" value="100+" data-filter="price">
                                    <span class="check-indicator radio"></span>
                                    $100+
                                </label>
                            </div>
                        </div>

                        <div class="filter-group">
                            <h3 class="filter-group-title">Minimum Rating</h3>
                            <div class="filter-options" id="ratingFilters">
                                <label class="filter-checkbox">
                                    <input type="radio" name="rating" value="0" checked data-filter="rating">
                                    <span class="check-indicator radio"></span>
                                    Any Rating
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="rating" value="4" data-filter="rating">
                                    <span class="check-indicator radio"></span>
                                    ★ 4 & Up
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="rating" value="3" data-filter="rating">
                                    <span class="check-indicator radio"></span>
                                    ★ 3 & Up
                                </label>
                                <label class="filter-checkbox">
                                    <input type="radio" name="rating" value="2" data-filter="rating">
                                    <span class="check-indicator radio"></span>
                                    ★ 2 & Up
                                </label>
                            </div>
                        </div>
                    </aside>

                    <div class="collection-main-content">
                        <div class="collection-toolbar">
                            <button class="filter-toggle-btn" id="filterToggle" type="button">
                                <i class="fas fa-sliders-h"></i>
                                Filters
                            </button>
                            <div class="toolbar-results" id="resultsCount">Showing 0 of 0 products</div>
                            <div class="toolbar-sort">
                                <label for="sortSelect" class="sr-only">Sort by</label>
                                <select id="sortSelect" class="sort-select">
                                    <option value="featured">Featured</option>
                                    <option value="price-asc">Price: Low to High</option>
                                    <option value="price-desc">Price: High to Low</option>
                                    <option value="rating">Highest Rated</option>
                                    <option value="name">Name: A-Z</option>
                                </select>
                                <i class="fas fa-chevron-down sort-arrow" aria-hidden="true"></i>
                            </div>

                        </div>

                        <div class="active-filters" id="activeFilters"></div>

                        <div class="products-grid" id="productsGrid"></div>

                        <div class="empty-state" id="emptyState" style="display:none;">
                            <div class="empty-state-icon"><i class="fas fa-search"></i></div>
                            <h3 class="empty-state-title">No products found</h3>
                            <p class="empty-state-text">Try adjusting your filters or search criteria.</p>
                            <button class="btn btn-outline-dark empty-state-reset" id="emptyReset" type="button">Reset Filters</button>
                        </div>

                        <div class="collection-pagination" id="pagination"></div>
                    </div>

                </div>
            </div>
        </section>

    </main>

    <div class="footer-sections-wrapper">
        <div id="brand-logos-placeholder"></div>
        <div id="footer-placeholder"></div>
    </div>

    <div id="wishlist-drawer-placeholder"></div>
    <div id="cart-drawer-placeholder"></div>
    <div id="search-overlay-placeholder"></div>

    <div class="filters-overlay" id="filtersOverlay"></div>

    <script src="collection.js" type="module" defer></script>
</body>
</html>
